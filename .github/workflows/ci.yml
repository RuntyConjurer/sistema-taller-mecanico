name: Verificación SGTRA

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

concurrency:
  group: sgtra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calidad:
    name: Calidad de código
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Instalar dependencias
        run: npm run install:all

      - name: Verificar proyecto
        run: npm run check

  integracion:
    name: PostgreSQL, API, frontend y Nginx
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://sgtra:sgtra_local_password@127.0.0.1:5432/sgtra
      DATABASE_SSL: "false"
      JWT_SECRET: secreto-ci-sgtra-no-productivo
      CORS_ORIGIN: http://127.0.0.1:8080,http://127.0.0.1:5180
      VITE_DEV_PORT: "5180"
      VITE_DATA_SOURCE: api
      VITE_API_BASE_URL: ""
      PORT: "3100"
      VITE_DEV_API_URL: http://127.0.0.1:3100
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar PostgreSQL y Nginx
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql nginx

      - name: Crear base de datos local
        run: |
          sudo service postgresql start
          sudo -u postgres psql --set ON_ERROR_STOP=1 --command "CREATE USER sgtra WITH PASSWORD 'sgtra_local_password';"
          sudo -u postgres psql --set ON_ERROR_STOP=1 --command "CREATE DATABASE sgtra OWNER sgtra;"

      - name: Instalar e inicializar SGTRA
        run: |
          npm run install:all
          npm run db:init

      - name: Iniciar backend y frontend con npm
        run: |
          nohup npm --prefix backend start > /tmp/sgtra-api.log 2>&1 &
          nohup npm --prefix frontend run dev -- --host 127.0.0.1 > /tmp/sgtra-web.log 2>&1 &

      - name: Configurar Nginx local
        run: |
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo cp nginx/sgtra.local.conf /etc/nginx/sites-available/sgtra
          sudo ln -s /etc/nginx/sites-available/sgtra /etc/nginx/sites-enabled/sgtra
          sudo nginx -t
          sudo service nginx restart

      - name: Esperar servicios
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/api/v1/ready >/dev/null && curl --fail --silent http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Verificar flujo integral
        env:
          SMOKE_BASE_URL: http://127.0.0.1:8080/api/v1
        run: node backend/scripts/smoke-flow.js

      - name: Verificar reglas PostgreSQL
        env:
          PGPASSWORD: sgtra_local_password
        run: psql --host 127.0.0.1 --username sgtra --dbname sgtra --set ON_ERROR_STOP=1 --file database/tests/001_reglas_negocio.sql

      - name: Verificar ruta profunda del frontend
        run: curl --fail http://127.0.0.1:8080/agendar-cita

      - name: Mostrar registros si falla
        if: failure()
        run: |
          cat /tmp/sgtra-api.log || true
          cat /tmp/sgtra-web.log || true
          sudo tail -200 /var/log/nginx/error.log || true
