name: Verificación SGTRA

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

concurrency:
  group: sgtra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calidad:
    name: Calidad de código
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Instalar backend
        run: npm ci
        working-directory: backend

      - name: Verificar backend
        run: npm run check && npm test
        working-directory: backend

      - name: Instalar frontend
        run: npm ci
        working-directory: frontend

      - name: Verificar frontend
        run: npm run lint && npm test && npm run build
        working-directory: frontend

  integracion:
    name: PostgreSQL, API y Nginx
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar Docker Compose
        run: docker compose config --quiet

      - name: Construir e iniciar SGTRA
        run: docker compose up -d --build --wait

      - name: Verificar flujo integral
        run: node backend/scripts/smoke-flow.js

      - name: Verificar reglas PostgreSQL
        run: |
          cat database/tests/001_reglas_negocio.sql |
            docker compose exec -T db sh -c 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB"'

      - name: Mostrar registros si falla
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Detener servicios
        if: always()
        run: docker compose down -v
