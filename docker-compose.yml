name: sgtra

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgtra}
      POSTGRES_USER: ${POSTGRES_USER:-sgtra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgtra_local_password}
      TZ: ${TZ:-America/Santo_Domingo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/database:ro
      - ./docker/postgres/init-database.sh:/docker-entrypoint-initdb.d/001-init-database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-sgtra}:${POSTGRES_PASSWORD:-sgtra_local_password}@db:5432/${POSTGRES_DB:-sgtra}
      DATABASE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-cambiar-este-secreto-en-entornos-compartidos}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      TZ: ${TZ:-America/Santo_Domingo}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_DATA_SOURCE: api
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
